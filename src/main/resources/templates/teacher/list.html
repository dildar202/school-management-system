<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Teachers | School Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
:root{
  --bg:#f8fafc;
  --card:#ffffff;
  --text:#111827;
  --muted:#6b7280;
  --primary:#2563eb;
  --secondary:#7c3aed;
  --border:#e5e7eb;
  --danger:#dc2626;
  --warning:#f59e0b;
}

body.dark{
  --bg:#0f172a;
  --card:#111827;
  --text:#f9fafb;
  --muted:#94a3b8;
  --primary:#60a5fa;
  --secondary:#a78bfa;
  --border:#334155;
  --danger:#ef4444;
  --warning:#fbbf24;
}

body{
  background:linear-gradient(135deg,var(--bg),#dbeafe);
  color:var(--text);
  transition:.3s ease;
  min-height:100vh;
}

body.dark{
  background:linear-gradient(135deg,#020617,#111827);
}

.navbar-custom{
  background:linear-gradient(135deg,var(--primary),var(--secondary));
}

.card-modern{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:22px;
  box-shadow:0 20px 40px rgba(0,0,0,.08);
}

.table{
  color:var(--text);
}

.table thead{
  background:linear-gradient(135deg,var(--primary),var(--secondary));
  color:white;
}

.table thead th{
  border:none;
  padding:16px;
}

.table td{
  padding:14px 16px;
  vertical-align:middle;
}

.btn-modern{
  border:none;
  border-radius:12px;
  padding:.6rem 1rem;
  font-weight:600;
  transition:.25s;
}

.btn-modern:hover{
  transform:translateY(-2px);
}

.btn-add{
  background:linear-gradient(135deg,var(--primary),var(--secondary));
  color:white;
}

.btn-edit{
  background:var(--warning);
  color:white;
}

.btn-delete{
  background:var(--danger);
  color:white;
}

.small-muted{
  color:var(--muted);
}

.switch-box{
  display:flex;
  align-items:center;
  gap:10px;
}

.avatar{
  width:38px;
  height:38px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,var(--primary),var(--secondary));
  color:white;
  font-weight:700;
}

.empty-box{
  padding:40px 20px;
  text-align:center;
  color:var(--muted);
}
</style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold fs-4" href="/">🎓 School Management</a>

    <div class="ms-auto switch-box text-white">
      <span>🌙</span>
      <div class="form-check form-switch m-0">
        <input class="form-check-input" type="checkbox" id="themeSwitch">
      </div>
    </div>
  </div>
</nav>

<div class="container py-4">

  <!-- Header -->
  <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
    <div>
      <h2 class="fw-bold mb-1">Teacher Records</h2>
      <div class="small-muted">Manage all teachers professionally</div>
    </div>

    <div class="d-flex gap-2">
      <a href="/" class="btn btn-outline-secondary btn-modern">🏠 Dashboard</a>

      <a th:href="@{/teachers/new}" class="btn btn-modern btn-add shadow">
        ➕ Add Teacher
      </a>
    </div>
  </div>

  <!-- Table Card -->
  <div class="card-modern p-3">

    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead>
          <tr>
            <th>ID</th>
            <th>Teacher</th>
            <th>Subject</th>
            <th>Email</th>
            <th>Phone</th>
            <th width="180">Actions</th>
          </tr>
        </thead>

        <tbody>

          <tr th:each="teacher : ${teachers}">
            <td th:text="${teacher.id}"></td>

            <td>
              <div class="d-flex align-items-center gap-2">
                <div class="avatar"
                     th:text="${#strings.substring(teacher.name,0,1)}">T</div>
                <span th:text="${teacher.name}"></span>
              </div>
            </td>

            <td th:text="${teacher.subject}"></td>
            <td th:text="${teacher.email}"></td>
            <td th:text="${teacher.phone}"></td>

            <td>
              <div class="d-flex gap-2">
                <a th:href="@{/teachers/edit/{id}(id=${teacher.id})}"
                   class="btn btn-sm btn-modern btn-edit">
                  ✏️ Edit
                </a>

                <a th:href="@{/teachers/delete/{id}(id=${teacher.id})}"
                   class="btn btn-sm btn-modern btn-delete"
                   onclick="return confirm('Delete this teacher?')">
                  🗑 Delete
                </a>
              </div>
            </td>
          </tr>

          <tr th:if="${#lists.isEmpty(teachers)}">
            <td colspan="6">
              <div class="empty-box">
                <h5 class="mb-2">No Teachers Found</h5>
                <p class="mb-3">Add your first teacher to start managing staff 🚀</p>
                <a th:href="@{/teachers/new}" class="btn btn-modern btn-add">
                  ➕ Add Teacher
                </a>
              </div>
            </td>
          </tr>

        </tbody>
      </table>
    </div>

  </div>
</div>

<script>
const body = document.body;
const toggle = document.getElementById("themeSwitch");

if(localStorage.getItem("theme")==="dark"){
  body.classList.add("dark");
  toggle.checked = true;
}

toggle.addEventListener("change", ()=>{
  body.classList.toggle("dark");
  localStorage.setItem(
    "theme",
    body.classList.contains("dark") ? "dark" : "light"
  );
});
</script>

</body>
</html>
