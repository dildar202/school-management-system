<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
<meta charset="UTF-8">
<title>Dashboard | School ERP</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#f4f7ff;
}

/* SIDEBAR */
.sidebar{
    width:240px;
    height:100vh;
    position:fixed;
    top:0;
    left:0;
    background:linear-gradient(135deg,#111827,#1f2937);
    color:white;
    padding:20px;
}

.sidebar h3{
    font-size:20px;
    margin-bottom:15px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:10px;
    margin:6px 0;
    border-radius:8px;
    transition:0.3s;
}

.sidebar a:hover{
    background:rgba(255,255,255,0.12);
}

/* MAIN */
.main{
    margin-left:260px;
    padding:25px;
}

/* CARDS */
.card-box h2{
    font-size:22px;
    font-weight:700;
    margin:0;

    word-break: break-word;
    overflow-wrap: break-word;
    white-space: normal;
}

.card-box{
    overflow:hidden;
}

.money{
    font-size:20px !important;
    font-weight:700;
    word-break: break-word;
}

.bg-blue{background:linear-gradient(135deg,#2563eb,#1d4ed8);}
.bg-green{background:linear-gradient(135deg,#16a34a,#15803d);}
.bg-purple{background:linear-gradient(135deg,#7c3aed,#6d28d9);}
.bg-orange{background:linear-gradient(135deg,#f97316,#ea580c);}
.bg-pink{background:linear-gradient(135deg,#db2777,#be185d);}

/* FIXED DARK CARD (cleaner look) */
.bg-dark{
    background:linear-gradient(135deg,#374151,#111827);
}

.bg-red{background:linear-gradient(135deg,#dc2626,#b91c1c);}

.section-title{
    margin-top:25px;
    margin-bottom:10px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <h3>🎓 School ERP</h3>

    <a href="/">🏠 Dashboard</a>
    <a href="/students">👨‍🎓 Students</a>
    <a href="/attendance">📅 Attendance</a>

    <div sec:authorize="hasRole('ADMIN')">
        <a href="/teachers">👨‍🏫 Teachers</a>
        <a href="/fees">💰 Fees</a>
    </div>

    <form th:action="@{/logout}" method="post" style="margin-top:10px;">
        <button type="submit" class="btn btn-danger w-100">
            🚪 Logout
        </button>
    </form>

</div>

<!-- MAIN CONTENT -->
<div class="main">

    <h2>📊 Dashboard</h2>

    <p>
        Welcome,
        <b sec:authentication="name"></b>
        |
        Role:
        <span sec:authentication="principal.authorities"></span>
    </p>

    <h5 class="section-title">School Summary</h5>

    <div class="row g-3">

        <div class="col-md-3">
            <div class="card-box bg-blue">
                <h6>Total Students</h6>
                <h2 th:text="${totalStudents}">0</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card-box bg-green">
                <h6>Total Teachers</h6>
                <h2 th:text="${totalTeachers}">0</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card-box bg-purple">
                <h6>Attendance %</h6>
                <h2 th:text="${attendancePercent != null ? attendancePercent + '%' : '0%'}">0%</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card-box bg-orange">
                <h6>Present</h6>
                <h2 th:text="${presentToday}">0</h2>
            </div>
        </div>

    </div>

    <!-- FEES ONLY ADMIN -->
    <div sec:authorize="hasRole('ADMIN')">

        <h5 class="section-title">Fees Analytics</h5>

        <div class="row g-3">

            <div class="col-md-3">
                <div class="card-box bg-pink">
                    <h6>Total Fees</h6>
                    <h2 th:text="${totalFeeRecords}">0</h2>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card-box bg-dark">
                    <h6>Collected</h6>
                    <h2 class="money"
                        th:text="${totalCollected != null ? #numbers.formatDecimal(totalCollected,1,2) : '0.00'}">
                        0
                    </h2>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card-box bg-red">
                    <h6>Pending</h6>
                    <h2 th:text="${totalPending}">0</h2>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card-box bg-green">
                    <h6>Paid</h6>
                    <h2 th:text="${paidRecords}">0</h2>
                </div>
            </div>

        </div>

    </div>

</div>

</body>
</html>
