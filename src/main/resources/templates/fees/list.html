<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fees | School ERP</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f8fafc;
    font-family:'Segoe UI',sans-serif;
}
.card-box{
    background:white;
    border-radius:18px;
    padding:25px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}
</style>
</head>

<body class="container py-5">

<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>💰 Fee Records</h2>

    <div>
        <a href="/" class="btn btn-outline-primary">🏠 Dashboard</a>
        <a href="/fees/new" class="btn btn-success">➕ Add Fee</a>
    </div>
</div>

<div class="card-box">

<table class="table table-hover align-middle">

<thead class="table-dark">
<tr>
    <th>ID</th>
    <th>Student</th>
    <th>Amount</th>
    <th>Status</th>
    <th>Date</th>
    <th>Actions</th>
</tr>
</thead>

<tbody>

<tr th:each="f : ${fees}">

    <td th:text="${f.id}"></td>

    <!-- SAFE NULL CHECK -->
    <td th:text="${f.student != null ? f.student.name : 'No Student'}"></td>

    <td th:text="'Rs. ' + ${f.amount}"></td>

    <td>
        <span th:text="${f.status}"
              th:classappend="${f.status=='PAID'} ? 'text-success fw-bold' : 'text-danger fw-bold'">
        </span>
    </td>

    <td th:text="${f.paymentDate}"></td>

    <td>
        <a th:href="@{/fees/edit/{id}(id=${f.id})}" class="btn btn-sm btn-warning">
            ✏️ Edit
        </a>

        <a th:href="@{/fees/delete/{id}(id=${f.id})}"
           class="btn btn-sm btn-danger"
           onclick="return confirm('Delete this record?')">
            🗑 Delete
        </a>
    </td>

</tr>

<tr th:if="${#lists.isEmpty(fees)}">
    <td colspan="6" class="text-center text-muted py-4">
        No fee records found.
    </td>
</tr>

</tbody>

</table>

</div>

</body>
</html>
