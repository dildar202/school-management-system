<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Add Fee</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container py-5">

<div class="d-flex justify-content-between mb-4">
    <h2>💰 Add Fee Record</h2>
    <a href="/fees" class="btn btn-outline-primary">⬅ Back</a>
</div>

<form th:action="@{/fees}" th:object="${fee}" method="post">

    <!-- Student -->
    <div class="mb-3">
        <label>Student</label>
        <select th:field="*{student}" class="form-control" required>
            <option value="">-- Select Student --</option>
            <option th:each="s : ${students}"
                    th:value="${s.id}"
                    th:text="${s.name}">
            </option>
        </select>
    </div>

    <!-- Amount -->
    <div class="mb-3">
        <label>Amount</label>
        <input type="number" step="0.01" th:field="*{amount}" class="form-control" required>
    </div>

    <!-- Status -->
    <div class="mb-3">
        <label>Status</label>
        <select th:field="*{status}" class="form-control">
            <option value="PAID">PAID</option>
            <option value="UNPAID">UNPAID</option>
        </select>
    </div>

    <!-- Date -->
    <div class="mb-3">
        <label>Payment Date</label>
        <input type="date" th:field="*{paymentDate}" class="form-control">
    </div>

    <button class="btn btn-success">💾 Save Fee</button>

</form>

</body>
</html>
