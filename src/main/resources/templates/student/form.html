<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Add Student | School Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
:root{
  --bg:#f8fafc;
  --card:#ffffff;
  --text:#111827;
  --muted:#6b7280;
  --primary:#2563eb;
  --border:#e5e7eb;
}
body.dark{
  --bg:#0f172a;
  --card:#111827;
  --text:#f9fafb;
  --muted:#9ca3af;
  --primary:#60a5fa;
  --border:#334155;
}
body{
  background:var(--bg);
  color:var(--text);
  transition:.3s;
}
.navbar-custom{
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
}
.card-modern{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
}
.form-control{
  border-radius:12px;
  padding:.75rem;
}
.form-control,
.form-label{
  color:var(--text);
}
.switch-box{
  display:flex;
  align-items:center;
  gap:10px;
}
</style>
</head>

<body>


     <div class="d-flex justify-content-between align-items-center mb-4">

    <h2>👨‍🎓 Add Student</h2>

    <a href="/" class="btn btn-outline-primary">🏠 Dashboard</a>

</div>

<nav class="navbar navbar-expand-lg navbar-dark navbar-custom shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold" href="#">🎓 School Management</a>

    <div class="ms-auto switch-box text-white">
      <span>🌙</span>
      <div class="form-check form-switch m-0">
        <input class="form-check-input" type="checkbox" id="themeSwitch">
      </div>
    </div>
  </div>
</nav>

<div class="container py-5">

  <div class="row justify-content-center">
    <div class="col-lg-7">

      <div class="card-modern p-4">
        <h2 class="fw-bold mb-1">Add New Student</h2>
        <p class="text-muted mb-4">Create student profile quickly and beautifully</p>

<form th:action="@{/students/save}" th:object="${student}" method="post">
          <!-- myinserted  -->
          <input type="hidden" th:field="*{id}">
          <div class="mb-3">
            <label class="form-label">Student Name</label>
            <input type="text" th:field="*{name}" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Roll Number</label>
            <input type="text" th:field="*{rollNo}" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email" th:field="*{email}" class="form-control">
          </div>

          <div class="mb-3">
            <label class="form-label">Phone Number</label>
            <input type="text" th:field="*{phone}" class="form-control">
          </div>

          <div class="d-flex gap-2">
            <button class="btn btn-primary px-4">💾 Save Student</button>

            <a th:href="@{/students}" class="btn btn-outline-secondary">
              ↩ Back
            </a>
          </div>

        </form>
      </div>

    </div>
  </div>

</div>

<script>
const body = document.body;
const toggle = document.getElementById("themeSwitch");

if(localStorage.getItem("theme")==="dark"){
  body.classList.add("dark");
  toggle.checked = true;
}

toggle.addEventListener("change", ()=>{
  body.classList.toggle("dark");
  localStorage.setItem("theme",
    body.classList.contains("dark") ? "dark" : "light");
});
</script>

</body>
</html>
