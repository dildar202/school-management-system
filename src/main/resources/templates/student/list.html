<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Students | School Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
:root{
  --bg:#f8fafc;
  --card:#ffffff;
  --text:#111827;
  --muted:#6b7280;
  --primary:#2563eb;
  --border:#e5e7eb;
}

body.dark{
  --bg:#0f172a;
  --card:#111827;
  --text:#f9fafb;
  --muted:#9ca3af;
  --primary:#60a5fa;
  --border:#334155;
}

body{
  background:var(--bg);
  color:var(--text);
  transition:.3s;
}

.navbar-custom{
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
}

.card-modern{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.table thead{
  background:var(--primary);
  color:white;
}

.table{
  color:var(--text);
}

.btn-modern{
  border-radius:12px;
  padding:.55rem 1rem;
}

.small-muted{
  color:var(--muted);
}

.switch-box{
  display:flex;
  align-items:center;
  gap:10px;
}
</style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold" href="#">🎓 School Management</a>

    <div class="ms-auto switch-box text-white">
      <span>🌙</span>
      <div class="form-check form-switch m-0">
        <input class="form-check-input" type="checkbox" id="themeSwitch">
      </div>
    </div>
  </div>
</nav>

<div class="container py-4">

  <!-- Header Section -->
  <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">

    <div>
      <h2 class="fw-bold mb-0">👨‍🎓 Student Records</h2>
      <div class="small-muted">Manage all students professionally</div>
    </div>

    <div class="d-flex gap-2 flex-wrap">
      <a href="/" class="btn btn-outline-primary btn-modern">
        🏠 Dashboard
      </a>

      <a th:href="@{/students/new}" class="btn btn-success btn-modern">
        ➕ Add Student
      </a>

      <a href="/pdf/students" class="btn btn-danger btn-modern">
        📄 Download PDF
      </a>
    </div>

  </div>

  <!-- Student Table Card -->
  <!-- Table -->
<div class="card-modern p-3">

  <div class="table-responsive">
    <table class="table align-middle table-hover">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Roll No</th>
          <th>Email</th>
          <th>Phone</th>
          <th class="text-center">Actions</th>
        </tr>
      </thead>

      <tbody>
        <tr th:each="student : ${students}">
          <td th:text="${student.id}"></td>
          <td th:text="${student.name}"></td>
          <td th:text="${student.rollNo}"></td>
          <td th:text="${student.email}"></td>
          <td th:text="${student.phone}"></td>

          <!-- Actions Column -->
          <!-- Actions Column -->
<td class="text-center">

  <!-- Use flex for proper spacing -->
  <div class="d-flex justify-content-center gap-2">

    <!-- Edit Button -->
    <a th:href="@{/students/edit/{id}(id=${student.id})}"
       class="btn btn-warning btn-sm rounded-pill px-3">
      ✏ Edit
    </a>

    <!-- Delete Button -->
    <a th:href="@{/students/delete/{id}(id=${student.id})}"
       class="btn btn-danger btn-sm rounded-pill px-3"
       onclick="return confirm('Are you sure you want to delete this student?');">
      🗑 Delete
    </a>

  </div>

</td>

        </tr>

        <!-- Empty State -->
        <tr th:if="${#lists.isEmpty(students)}">
          <td colspan="6" class="text-center py-4 text-muted">
            No students found. Add your first student 🚀
          </td>
        </tr>

      </tbody>
    </table>
  </div>

</div>


</div>

<script>
const body = document.body;
const toggle = document.getElementById("themeSwitch");

if(localStorage.getItem("theme") === "dark"){
  body.classList.add("dark");
  toggle.checked = true;
}

toggle.addEventListener("change", () => {
  body.classList.toggle("dark");
  localStorage.setItem(
    "theme",
    body.classList.contains("dark") ? "dark" : "light"
  );
});


</script>

<script>
  // Auto-hide Bootstrap alerts after 3 seconds
  setTimeout(function () {
    let alerts = document.querySelectorAll('.alert');

    alerts.forEach(function(alert) {
      // Bootstrap fade out effect
      alert.classList.remove('show');
      alert.classList.add('fade');

      // remove from DOM after fade
      setTimeout(() => {
        alert.remove();
      }, 500);
    });

  }, 8000); // 3 seconds
</script>
</body>
</html>
