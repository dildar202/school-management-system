<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login | School ERP</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* BACKGROUND */
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Segoe UI',sans-serif;
    background: linear-gradient(-45deg, #2563eb, #7c3aed, #06b6d4, #1f2937);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
}

/* ANIMATION BACKGROUND */
@keyframes gradientBG {
    0% {background-position:0% 50%;}
    50% {background-position:100% 50%;}
    100% {background-position:0% 50%;}
}

/* LOGIN CARD */
.login-card{
    width:100%;
    max-width:420px;
    padding:35px;
    border-radius:20px;

    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);

    box-shadow: 0 25px 45px rgba(0,0,0,0.2);
    color:white;

    animation: floatCard 3s ease-in-out infinite;
}

/* FLOAT EFFECT */
@keyframes floatCard {
    0% {transform: translateY(0px);}
    50% {transform: translateY(-8px);}
    100% {transform: translateY(0px);}
}

/* TITLE */
.login-card h2{
    text-align:center;
    font-weight:700;
    margin-bottom:5px;
}

.sub{
    text-align:center;
    margin-bottom:25px;
    opacity:0.9;
}

/* INPUT */
.form-control{
    height:48px;
    border-radius:12px;
    border:none;
    margin-bottom:15px;
}

/* BUTTON */
.btn-login{
    width:100%;
    height:48px;
    border-radius:12px;
    font-weight:600;
    background: #111827;
    border:none;
    transition:0.3s;
}

.btn-login:hover{
    background:#000;
    transform:scale(1.02);
}

/* MESSAGES */
.msg{
    text-align:center;
    margin-top:10px;
    font-size:14px;
}

</style>
</head>

<body>

<div class="login-card">

    <h2>🎓 School ERP</h2>
    <div class="sub">Secure Login Portal</div>

    <form th:action="@{/login}" method="post">

        <input type="text" name="username" class="form-control" placeholder="Username" required>

        <input type="password" name="password" class="form-control" placeholder="Password" required>

        <button type="submit" class="btn btn-login text-white">
            🔐 Login
        </button>

        <div th:if="${param.error}" class="msg text-danger">
            ❌ Invalid username or password
        </div>

        <div th:if="${param.logout}" class="msg text-success">
            ✅ Logged out successfully
        </div>

    </form>

</div>

</body>
</html>
