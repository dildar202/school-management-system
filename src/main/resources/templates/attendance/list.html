<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Attendance</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container py-4">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-3">

        <h2>📅 Attendance Records</h2>

        <div class="d-flex gap-2">

            <!-- DASHBOARD BUTTON -->
            <a href="/" class="btn btn-outline-primary">
                🏠 Dashboard
            </a>

            <!-- ADD ATTENDANCE -->
            <a href="/attendance/new" class="btn btn-success">
                ➕ Mark Attendance
            </a>

        </div>

    </div>

    <!-- TABLE -->
    <table class="table table-bordered table-hover">

        <thead>
            <tr>
                <th>ID</th>
                <th>Date</th>
                <th>Status</th>
                <th>Student</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>

            <tr th:each="a : ${records}">
                <td th:text="${a.id}"></td>
                <td th:text="${a.date}"></td>
                <td th:text="${a.status}"></td>

                <td th:text="${a.student != null ? a.student.name : 'No Student'}"></td>

                <td>
                    <a th:href="@{/attendance/delete/{id}(id=${a.id})}"
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('Delete?')">
                        Delete
                    </a>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(records)}">
                <td colspan="5" class="text-center">No records found</td>
            </tr>

        </tbody>

    </table>

</div>

</body>
</html>
