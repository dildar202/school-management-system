<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Mark Attendance</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

    <!-- HEADER WITH BACK BUTTON -->
    <div class="d-flex justify-content-between align-items-center mb-3">

        <h2>📅 Mark Attendance</h2>

        <!-- BACK BUTTON -->
        <a href="/attendance" class="btn btn-outline-secondary">
            ↩ Back to Attendance
        </a>

    </div>

    <form th:action="@{/attendance/save}" th:object="${attendance}" method="post">

        <!-- DATE -->
        <div class="mb-3">
            <label>Date</label>
            <input type="date" th:field="*{date}" class="form-control" required>
        </div>

        <!-- STATUS -->
        <div class="mb-3">
            <label>Status</label>
            <select th:field="*{status}" class="form-control" required>
                <option value="Present">Present</option>
                <option value="Absent">Absent</option>
            </select>
        </div>

        <!-- STUDENT -->
        <div class="mb-3">
            <label>Student</label>

            <select th:field="*{student}" class="form-control" required>
                <option value="">-- Select Student --</option>

                <option th:each="s : ${students}"
                        th:value="${s.id}"
                        th:text="${s.name + ' (' + s.rollNo + ')'}">
                </option>

            </select>

        </div>

        <button class="btn btn-primary">Save Attendance</button>

    </form>

</div>

</body>
</html>
